# Cloud Build: build and push API image (Artifact Registry).
# Usage (from repo root):
#   export IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/ralphai/todc-reporting-app:$TAG"
#   gcloud builds submit . --config=infra/gcp/cloudbuild.yaml --substitutions=_IMAGE="$IMAGE"
#
substitutions:
  _IMAGE: us-central1-docker.pkg.dev/PROJECT_ID/ralphai/todc-reporting-app:latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/gcp/Dockerfile.api
      - -t
      - $_IMAGE
      - .

images:
  - $_IMAGE
