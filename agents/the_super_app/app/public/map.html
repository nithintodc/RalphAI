<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Enterprise Restaurant Map — TODC</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F2EA; --paper2:#FBF8F2; --panel:#FFFFFF; --ink:#1C1814; --muted:#6E655A;
    --faint:#9A9082; --line:#E7E0D3; --line2:#EFEADF;
    --accent:#E0431A; --accent-d:#B8350F; --amber:#E8A317;
    --shadow:0 1px 2px rgba(28,24,20,.05), 0 8px 24px rgba(28,24,20,.07);
    --shadow-lg:0 12px 40px rgba(28,24,20,.18);
    --land:#FFFFFF; --land-stroke:#D9CFBE;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:"Public Sans",-apple-system,system-ui,sans-serif;
    color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

  /* ---- Header ---- */
  header.top{
    display:flex;align-items:center;gap:18px;padding:13px 20px;
    background:linear-gradient(180deg,#211C17,#171310);color:#F4EFE6;
    border-bottom:1px solid #2c2620;z-index:1200;flex:none;
  }
  .brand{display:flex;align-items:center;gap:13px;min-width:0}
  .brand .glyph{
    width:38px;height:38px;border-radius:11px;flex:none;
    background:radial-gradient(circle at 32% 28%,var(--amber),var(--accent) 78%);
    display:grid;place-items:center;box-shadow:0 4px 14px rgba(224,67,26,.4);
    position:relative;
  }
  .brand .glyph svg{width:21px;height:21px;display:block}
  .brand .title{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:19px;letter-spacing:-.02em;line-height:1;white-space:nowrap}
  .brand .sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#A79C8C;margin-top:4px;font-weight:600}
  .top .spacer{flex:1}
  .counter{display:flex;align-items:baseline;gap:9px;font-family:"JetBrains Mono",monospace;white-space:nowrap}
  .counter .num{font-size:23px;font-weight:700;color:#fff;letter-spacing:-.01em}
  .counter .den{font-size:13px;color:#9b9080}
  .counter .lbl{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#8a8070;font-family:"Public Sans",sans-serif;font-weight:700;margin-left:2px}
  .btn{
    font:inherit;font-weight:600;font-size:13px;cursor:pointer;border:none;border-radius:9px;
    padding:9px 14px;display:inline-flex;align-items:center;gap:7px;transition:.16s;white-space:nowrap;
  }
  .btn svg{width:15px;height:15px}
  .btn-ghost{background:rgba(255,255,255,.08);color:#EDE7DC}
  .btn-ghost:hover{background:rgba(255,255,255,.16)}
  .btn-accent{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(224,67,26,.35)}
  .btn-accent:hover{background:var(--accent-d)}
  #menuBtn{display:none}

  /* ---- Body ---- */
  .body{display:flex;flex:1;min-height:0;position:relative}

  aside.sidebar{
    width:336px;flex:none;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;z-index:1100;
  }
  .search-wrap{padding:16px 16px 12px;border-bottom:1px solid var(--line2);flex:none}
  .search{position:relative}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
  .search input{
    width:100%;font:inherit;font-size:14px;padding:12px 36px 12px 38px;border-radius:11px;
    border:1.5px solid var(--line);background:var(--paper2);color:var(--ink);transition:.16s;
  }
  .search input::placeholder{color:var(--faint)}
  .search input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(224,67,26,.1)}
  .search .clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--faint);font-size:18px;padding:4px;line-height:1;display:none}
  .search .clear:hover{color:var(--ink)}
  .search-hint{font-size:11px;color:var(--faint);margin:9px 2px 0;letter-spacing:.01em}

  .filters{overflow-y:auto;flex:1;padding:6px 6px 20px}
  .filters::-webkit-scrollbar{width:9px}
  .filters::-webkit-scrollbar-thumb{background:#ded6c8;border-radius:6px;border:2px solid var(--panel)}

  .fsection{border-bottom:1px solid var(--line2)}
  .fhead{
    display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;
    padding:14px 12px;font:inherit;color:var(--ink);text-align:left;
  }
  .fhead .ftitle{font-size:11.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);flex:1}
  .fhead .cardinality{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--faint);font-weight:600;background:var(--paper2);border:1px solid var(--line2);border-radius:20px;padding:1px 7px}
  .fhead .badge{font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:700;background:var(--accent);color:#fff;border-radius:20px;padding:2px 8px;min-width:20px;text-align:center;display:none}
  .fhead .badge.on{display:inline-block}
  .fhead .chev{width:15px;height:15px;color:var(--faint);transition:transform .2s}
  .fsection.collapsed .chev{transform:rotate(-90deg)}
  .foptions{padding:0 8px 12px;display:flex;flex-direction:column;gap:1px;max-height:300px;overflow-y:auto}
  .fsection.collapsed .foptions{display:none}
  .fsection.collapsed .fsearch{display:none}
  .fsearch{padding:0 12px 11px}
  .fsearch input{width:100%;font:inherit;font-size:12.5px;padding:8px 11px;border-radius:8px;border:1.5px solid var(--line);background:var(--paper2);color:var(--ink)}
  .fsearch input::placeholder{color:var(--faint)}
  .fsearch input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(224,67,26,.1)}
  .foptions::-webkit-scrollbar{width:8px}
  .foptions::-webkit-scrollbar-thumb{background:#e4ddd0;border-radius:6px}

  label.opt{
    display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:background .12s;
  }
  label.opt:hover{background:var(--paper2)}
  label.opt input{position:absolute;opacity:0;width:0;height:0}
  .opt .box{
    width:18px;height:18px;border-radius:6px;border:1.7px solid #cfc6b6;flex:none;display:grid;place-items:center;transition:.14s;background:#fff;
  }
  .opt .box svg{width:12px;height:12px;color:#fff;opacity:0;transform:scale(.6);transition:.14s}
  .opt input:checked ~ .box{background:var(--accent);border-color:var(--accent)}
  .opt input:checked ~ .box svg{opacity:1;transform:scale(1)}
  .opt .swatch{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 2px #fff,0 1px 3px rgba(0,0,0,.25)}
  .opt .name{font-size:13.5px;flex:1;line-height:1.25;color:#332d26}
  .opt .cnt{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);font-weight:500}
  label.opt.hide{display:none}

  /* ---- Map ---- */
  .map-wrap{position:relative;flex:1;min-width:0;background:var(--paper)}
  #map{position:absolute;inset:0;background:var(--paper)}
  .leaflet-container{font-family:"Public Sans",sans-serif;background:var(--paper)}

  .r-dot-wrap{background:none;border:none}
  .r-dot{display:block;width:13px;height:13px;border-radius:50%;background:var(--c);border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4);transition:transform .12s}
  .r-dot-wrap:hover{z-index:9999 !important}
  .r-dot-wrap:hover .r-dot{transform:scale(1.5)}

  .r-cluster-wrap{background:none;border:none}
  .r-cluster{
    display:flex;align-items:center;justify-content:center;border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#403830,#201b16);color:#fff;
    font-family:"JetBrains Mono",monospace;font-weight:700;
    border:1.5px solid rgba(255,255,255,.9);
    box-shadow:0 5px 18px rgba(0,0,0,.3), 0 0 0 5px rgba(224,67,26,.14);
  }
  .r-cluster span{line-height:1}

  /* popup */
  .leaflet-popup-content-wrapper{border-radius:15px;box-shadow:var(--shadow-lg);padding:0;overflow:hidden;border:1px solid var(--line)}
  .leaflet-popup-content{margin:0;width:286px !important;line-height:1.4}
  .leaflet-popup-tip{box-shadow:var(--shadow-lg)}
  .pop-head{padding:14px 16px 12px;background:linear-gradient(180deg,#211C17,#191512);color:#fff;position:relative}
  .pop-brand{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px 3px 7px;border-radius:20px;color:#fff;margin-bottom:9px}
  .pop-brand .bd{width:8px;height:8px;border-radius:50%;background:#fff}
  .pop-name{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:16px;letter-spacing:-.01em;line-height:1.2;color:#fff}
  .pop-body{padding:13px 16px 15px}
  .pop-row{display:flex;gap:10px;padding:5px 0;font-size:12.5px;align-items:flex-start}
  .pop-row .k{color:var(--faint);min-width:74px;font-weight:600;letter-spacing:.02em;flex:none}
  .pop-row .v{color:var(--ink)}
  .pop-row .v.mono{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:12px}
  .pop-addr{font-size:13px;color:#433c33;padding:2px 0 11px;border-bottom:1px solid var(--line2);margin-bottom:7px;line-height:1.45}
  .pill{display:inline-block;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11.5px;color:#433c33;margin:1px 3px 1px 0;font-weight:500}
  .approx-tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--amber);font-weight:700;margin-top:9px;letter-spacing:.02em}
  .approx-tag svg{width:12px;height:12px}

  /* map control buttons (top-right) */
  .map-ctrls{position:absolute;top:14px;right:14px;z-index:800;display:flex;flex-direction:column;gap:8px}
  .mctl{
    width:40px;height:40px;border-radius:11px;background:var(--panel);border:1px solid var(--line);
    box-shadow:var(--shadow);cursor:pointer;display:grid;place-items:center;color:var(--ink);transition:.14s;
  }
  .mctl:hover{background:var(--paper2);transform:translateY(-1px)}
  .mctl svg{width:19px;height:19px}

  .empty-note{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:700;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);
    padding:22px 26px;text-align:center;max-width:300px;display:none;
  }
  .empty-note.show{display:block}
  .empty-note h3{font-family:"Bricolage Grotesque",sans-serif;margin:0 0 6px;font-size:17px}
  .empty-note p{margin:0;color:var(--muted);font-size:13px}

  .leaflet-bar a, .leaflet-control-zoom a{border-radius:0 !important}
  .leaflet-control-zoom{border-radius:11px !important;overflow:hidden;box-shadow:var(--shadow) !important;border:1px solid var(--line) !important}
  .leaflet-control-zoom a{color:var(--ink) !important;background:var(--panel) !important;width:40px;height:40px;line-height:40px;font-size:19px}
  .leaflet-control-zoom a:hover{background:var(--paper2) !important}
  .leaflet-control-attribution{background:rgba(255,255,255,.82) !important;font-size:10px !important;border-radius:8px 0 0 0;color:#8a8070 !important}

  .scrim{display:none;position:absolute;inset:0;background:rgba(20,16,12,.4);z-index:1050}

  @media (max-width:880px){
    #menuBtn{display:inline-flex}
    .brand .sub{display:none}
    .counter .lbl{display:none}
    aside.sidebar{position:absolute;top:0;left:0;bottom:0;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg)}
    aside.sidebar.open{transform:none}
    .scrim.show{display:block}
  }
  @media (max-width:480px){
    .brand .title{font-size:16px}
    header.top{padding:11px 14px;gap:10px}
    aside.sidebar{width:86vw}
  }

  /* ---- live-data module enhancements ---- */
  .statchips{display:flex;align-items:center;gap:7px;flex-wrap:nowrap}
  .statchip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
    padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.07);color:#EDE7DC;
    white-space:nowrap;border:1px solid rgba(255,255,255,.08)}
  .statchip .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .statchip b{font-family:"JetBrains Mono",monospace}
  @media(max-width:980px){.statchips{display:none}}
  .src-pill{font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    padding:5px 9px;border-radius:999px;white-space:nowrap;border:1px solid rgba(255,255,255,.12);
    color:#cdbfae;background:rgba(255,255,255,.05)}
  .src-pill.live{color:#7fe0a8;border-color:rgba(127,224,168,.35);background:rgba(127,224,168,.1)}
  .src-pill.loading{color:#E8A317;border-color:rgba(232,163,23,.4)}
  .src-pill.off{color:#f0a08c;border-color:rgba(240,160,140,.4);background:rgba(240,160,140,.1)}
  .active-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px}
  .active-chips:empty{display:none}
  .active-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    padding:4px 6px 4px 10px;border-radius:999px;background:var(--paper2);border:1px solid var(--line);color:var(--ink)}
  .active-chip .ck{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:800}
  .active-chip .x{display:grid;place-items:center;width:16px;height:16px;border-radius:50%;
    background:var(--line);color:var(--muted);cursor:pointer;font-size:13px;line-height:1;transition:.15s}
  .active-chip .x:hover{background:var(--accent);color:#fff}
  .legend{position:absolute;right:14px;bottom:30px;z-index:600;background:rgba(255,255,255,.94);
    backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);
    padding:11px 13px;max-width:210px;font-size:12px}
  .legend.collapsed .legend-body{display:none}
  .legend-head{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;
    font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:12px}
  .legend.collapsed .lchev{transform:rotate(-90deg)}
  .lchev{transition:.2s}
  .legend-body{margin-top:9px;display:grid;gap:6px;max-height:230px;overflow:auto}
  .legend-row{display:flex;align-items:center;gap:8px;color:var(--ink)}
  .legend-row .sw{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 2px rgba(0,0,0,.05)}
  .legend-row .lc{margin-left:auto;font-family:"JetBrains Mono",monospace;color:var(--faint);font-size:11px}
  @media(max-width:760px){.legend{display:none}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <button class="btn btn-ghost" id="menuBtn" aria-label="Toggle filters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand">
      <span class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg>
      </span>
      <div>
        <div class="title">Enterprise Restaurant Map</div>
        <div class="sub">TODC · Account Information</div>
      </div>
    </div>
    <div class="statchips" id="statChips"></div>
    <div class="spacer"></div>
    <div class="counter"><span class="num" id="cNum">0</span><span class="den" id="cDen">/ 0</span><span class="lbl">locations</span></div>
    <span class="src-pill" id="srcPill" title="Data source">…</span>
    <button class="btn btn-ghost" id="refreshBtn" title="Reload live data from Airtable">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      <span>Refresh</span>
    </button>
    <button class="btn btn-ghost" id="fitBtn" title="Zoom to fit current results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      <span>Fit</span>
    </button>
    <button class="btn btn-accent" id="resetBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      <span>Reset</span>
    </button>
  </header>

  <div class="body">
    <aside class="sidebar" id="sidebar">
      <div class="search-wrap">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchInput" type="text" placeholder="Search business, store ID, address…" autocomplete="off" spellcheck="false">
          <button class="clear" id="searchClear" aria-label="Clear search">×</button>
        </div>
        <div class="search-hint">Matches business name, National Store ID &amp; address.</div>
      </div>
      <div class="active-chips" id="activeChips"></div>
      <div class="filters" id="filters"></div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="legend" id="legend"></div>
      <div class="map-ctrls">
        <button class="mctl" id="usBtn" title="Reset to USA view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/><circle cx="12" cy="12" r="9"/></svg>
        </button>
      </div>
      <div class="empty-note" id="emptyNote">
        <h3>No matches</h3>
        <p>No locations match the current filters. Try clearing a filter or the search.</p>
      </div>
      <div class="scrim" id="scrim"></div>
    </main>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  "McDonalds":"#E63A11","Pizza Hut":"#C81D5A","Savvy Sliders":"#2E7D8A","KFC":"#7B3FA0",

};
const DEFAULT_COLOR = "#7A7065";
const colorFor = b => BRAND_COLORS[b] || DEFAULT_COLOR;

// ---- filter config (field key -> label) ----
const FILTER_DEFS = [
  {key:"f",    label:"Brand",          swatch:true,  multi:false},
  {key:"b",    label:"Business Name",  swatch:false, searchable:true, multi:false},
  {key:"mk",   label:"Market",         swatch:false},
  {key:"bu",   label:"Business Unit",  swatch:false},
  {key:"af",   label:"Affiliation",    swatch:false},
  {key:"stat", label:"Account Status", swatch:false}
];
// affiliation canonicalised to upper-case so "n/a" and "N/A" merge
const canon = (key,v) => key==="af" ? v.toUpperCase() : v;
const splitMulti = s => (s||"").split(",").map(x=>x.trim()).filter(Boolean);

const state = { q:"", sel:{} };
FILTER_DEFS.forEach(d => state.sel[d.key] = new Set());

const fmt = n => n.toLocaleString("en-US");

// ---- build option lists with counts ----
// account name is a single value (don't split on commas); category fields are multi-value
function valuesFor(def, p){
  if(def.multi===false){ const v=(p[def.key]||"").trim(); return v?[v]:[]; }
  return splitMulti(p[def.key]);
}
function optionList(def){
  const m = new Map();
  RAW.forEach(p => {
    valuesFor(def, p).forEach(raw => {
      const c = canon(def.key, raw);
      if(!m.has(c)) m.set(c, {label:c, count:0});
      m.get(c).count++;
    });
  });
  return [...m.values()].sort((a,b)=> b.count-a.count || a.label.localeCompare(b.label));
}

// ---- matching ----
function passes(p){
  if(state.q){
    const hay = (p.n+" "+(p.b||"")+" "+(p.s||"")+" "+(p.a||"")).toLowerCase();
    if(!hay.includes(state.q)) return false;
  }
  for(const d of FILTER_DEFS){
    const sel = state.sel[d.key];
    if(sel.size===0) continue;
    const vals = valuesFor(d, p).map(v=>canon(d.key,v));
    if(!vals.some(v=>sel.has(v))) return false;
  }
  return true;
}

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd', maxZoom:19,
  attribution:'&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// vector states fallback / overlay
L.geoJSON(US_STATES,{style:{color:'#C9BFAE',weight:.8,fill:true,fillColor:'#FFFFFF',fillOpacity:.45,interactive:false}}).addTo(map);

const cluster = L.markerClusterGroup({
  maxClusterRadius:52, spiderfyOnMaxZoom:true, showCoverageOnHover:false,
  chunkedLoading:true, removeOutsideVisibleBounds:true,
  iconCreateFunction(c){
    const n=c.getChildCount();
    const s = n<10?36 : n<50?44 : n<200?54 : 64;
    const fs = n<10?13 : n<200?14 : 15;
    return L.divIcon({className:'r-cluster-wrap',iconSize:[s,s],
      html:`<div class="r-cluster" style="width:${s}px;height:${s}px;font-size:${fs}px"><span>${n}</span></div>`});
  }
});
map.addLayer(cluster);

const iconCache = {};
function dotIcon(color){
  if(!iconCache[color]) iconCache[color] = L.divIcon({className:'r-dot-wrap',iconSize:[13,13],iconAnchor:[7,7],popupAnchor:[0,-8],
    html:`<span class="r-dot" style="--c:${color}"></span>`});
  return iconCache[color];
}

const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function popupHtml(p){
  const col = colorFor(p.f);
  const chips = v => splitMulti(v).map(x=>`<span class="pill">${esc(x)}</span>`).join("") || '<span class="v" style="color:#b3a999">—</span>';
  return `
    <div class="pop-head">
      <span class="pop-brand" style="background:${col}"><span class="bd"></span>${esc(p.f||"—")}</span>
      <div class="pop-name">${esc(p.n||"Unnamed account")}</div>
    </div>
    <div class="pop-body">
      <div class="pop-addr">${esc(p.a||[p.c,p.st,p.z].filter(Boolean).join(", "))}</div>
      <div class="pop-row"><span class="k">Store ID</span><span class="v mono">${esc(p.s||"—")}</span></div>
      <div class="pop-row"><span class="k">Market</span><span class="v">${chips(p.mk)}</span></div>
      <div class="pop-row"><span class="k">Bus. Unit</span><span class="v">${chips(p.bu)}</span></div>
      <div class="pop-row"><span class="k">Affiliation</span><span class="v">${chips(p.af)}</span></div>
      <div class="pop-row"><span class="k">Status</span><span class="v">${chips(p.stat)}</span></div>
      ${p.ap? `<div class="approx-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>Approx. location (ZIP/city centroid)</div>`:""}
    </div>`;
}

// precreate markers (rebuilt when live data arrives)
let markers = [];
function buildMarkers(){
  markers = RAW.map(p=>{
    const m = L.marker([p.lat,p.lng],{icon:dotIcon(colorFor(p.f))});
    m._p = p;
    m.bindPopup(()=>popupHtml(p),{closeButton:true,maxWidth:300});
    return m;
  });
}
buildMarkers();

function apply(fit){
  const shown = markers.filter(m=>passes(m._p));
  cluster.clearLayers();
  cluster.addLayers(shown);
  document.getElementById('cNum').textContent = fmt(shown.length);
  document.getElementById('cDen').textContent = "/ "+fmt(markers.length);
  document.getElementById('emptyNote').classList.toggle('show', shown.length===0);
  // update per-option live counts among current OTHER filters? keep static counts for clarity.
  updateBadges();
  updateStatChips(shown);
  renderActiveChips();
  if(fit && shown.length){
    const b = L.latLngBounds(shown.map(m=>m.getLatLng()));
    map.fitBounds(b.pad(0.15),{maxZoom:12});
  }
}

function updateBadges(){
  FILTER_DEFS.forEach(d=>{
    const b = document.querySelector(`.fsection[data-k="${d.key}"] .badge`);
    if(b){ const n=state.sel[d.key].size; b.textContent=n; b.classList.toggle('on', n>0); }
  });
}

// ---- render filter UI ----
const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const chevSvg = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

function renderFilters(){
  const host = document.getElementById('filters');
  host.innerHTML = "";
  FILTER_DEFS.forEach((d)=>{
    const opts = optionList(d);
    const sec = document.createElement('div');
    sec.className = 'fsection' + (d.collapsed ? ' collapsed' : '');
    sec.dataset.k = d.key;
    const head = document.createElement('button');
    head.className='fhead';
    head.innerHTML = `<span class="ftitle">${d.label}</span><span class="cardinality">${fmt(opts.length)}</span><span class="badge">0</span>${chevSvg}`;
    head.addEventListener('click',()=> sec.classList.toggle('collapsed'));
    sec.appendChild(head);

    if(d.searchable){
      const fs = document.createElement('div');
      fs.className='fsearch';
      fs.innerHTML = `<input type="text" placeholder="Filter ${esc(d.label.toLowerCase())}…" autocomplete="off" spellcheck="false">`;
      const inp = fs.querySelector('input');
      inp.addEventListener('input',()=>{
        const q = inp.value.trim().toLowerCase();
        sec.querySelectorAll('label.opt').forEach(l=>{
          l.classList.toggle('hide', q && !l.dataset.search.includes(q));
        });
      });
      sec.appendChild(fs);
    }

    const wrap = document.createElement('div');
    wrap.className='foptions';
    opts.forEach(o=>{
      const id = d.key+"__"+o.label.replace(/[^a-z0-9]/gi,'_');
      const lab = document.createElement('label');
      lab.className='opt'; lab.dataset.search=o.label.toLowerCase();
      lab.innerHTML = `<input type="checkbox" id="${id}">
        <span class="box">${checkSvg}</span>
        ${d.swatch? `<span class="swatch" style="background:${colorFor(o.label)}"></span>`:""}
        <span class="name">${esc(o.label)}</span>
        <span class="cnt">${fmt(o.count)}</span>`;
      const cb = lab.querySelector('input');
      cb.addEventListener('change',()=>{
        if(cb.checked) state.sel[d.key].add(o.label);
        else state.sel[d.key].delete(o.label);
        apply(false);
      });
      wrap.appendChild(lab);
    });
    sec.appendChild(wrap);
    host.appendChild(sec);
  });
}

// ---- search ----
let t=null;
const si = document.getElementById('searchInput');
const sc = document.getElementById('searchClear');
si.addEventListener('input',()=>{
  sc.style.display = si.value ? 'block':'none';
  clearTimeout(t);
  t=setTimeout(()=>{ state.q = si.value.trim().toLowerCase(); apply(false); },180);
});
sc.addEventListener('click',()=>{ si.value=""; sc.style.display='none'; state.q=""; apply(false); si.focus(); });

// ---- buttons ----
document.getElementById('resetBtn').addEventListener('click',()=>{
  state.q=""; si.value=""; sc.style.display='none';
  FILTER_DEFS.forEach(d=>state.sel[d.key].clear());
  document.querySelectorAll('.opt input:checked').forEach(c=>c.checked=false);
  document.querySelectorAll('.fsearch input').forEach(i=>i.value="");
  document.querySelectorAll('label.opt.hide').forEach(l=>l.classList.remove('hide'));
  document.querySelectorAll('.fsection.collapsed').forEach(s=>s.classList.remove('collapsed'));
  apply(false);
  map.setView(USA_VIEW.center, USA_VIEW.zoom);
});
document.getElementById('fitBtn').addEventListener('click',()=>apply(true));
document.getElementById('usBtn').addEventListener('click',()=>map.setView(USA_VIEW.center,USA_VIEW.zoom));

// ---- mobile drawer ----
const sb=document.getElementById('sidebar'), scrim=document.getElementById('scrim');
document.getElementById('menuBtn').addEventListener('click',()=>{ sb.classList.toggle('open'); scrim.classList.toggle('show'); });
scrim.addEventListener('click',()=>{ sb.classList.remove('open'); scrim.classList.remove('show'); });

// ---- enhancements: status chips, legend, active-filter chips ----
const STAT_COLORS = {
  "Live Account":"#1E8F5A","Live Account - Not Billed":"#3FA66B","Month to Month":"#5BA88C",
  "Temporary Pause":"#E8A317","Paused /Cancelled":"#C0392B","30 Day Test":"#2563B0",
  "Onboarding":"#7B3FA0","Contracting":"#8A6D3B","Pre-Trial":"#9A7BC0","Analysis Only":"#6E655A"
};
const firstStat = s => splitMulti(s)[0] || (s||"").trim();
const statColor = s => STAT_COLORS[firstStat(s)] || DEFAULT_COLOR;

function updateStatChips(shown){
  const host = document.getElementById('statChips'); if(!host) return;
  const m = new Map();
  shown.forEach(mk=>{ const s=firstStat(mk._p.stat)||"—"; m.set(s,(m.get(s)||0)+1); });
  const top = [...m.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3);
  host.innerHTML = top.map(([s,n])=>
    `<span class="statchip"><span class="dot" style="background:${statColor(s)}"></span>${esc(s)} <b>${fmt(n)}</b></span>`).join("");
}

function buildLegend(){
  const host = document.getElementById('legend'); if(!host) return;
  const counts = new Map();
  RAW.forEach(p=>{ const b=p.f||"—"; counts.set(b,(counts.get(b)||0)+1); });
  const rows = [...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([b,n])=>
    `<div class="legend-row"><span class="sw" style="background:${colorFor(b)}"></span><span>${esc(b)}</span><span class="lc">${fmt(n)}</span></div>`).join("");
  const collapsed = host.classList.contains('collapsed') ? ' collapsed' : '';
  host.className = 'legend'+collapsed;
  host.innerHTML = `<div class="legend-head"><span>Brands</span><svg class="lchev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div><div class="legend-body">${rows}</div>`;
  host.querySelector('.legend-head').addEventListener('click',()=>host.classList.toggle('collapsed'));
}

function renderActiveChips(){
  const host = document.getElementById('activeChips'); if(!host) return;
  const chips = [];
  if(state.q) chips.push({type:'q', label:'Search', val:state.q});
  FILTER_DEFS.forEach(d=>{ state.sel[d.key].forEach(v=> chips.push({type:'sel', key:d.key, label:d.label, val:v})); });
  host.innerHTML = chips.map((c,i)=>
    `<span class="active-chip" data-i="${i}"><span class="ck">${esc(c.label)}</span>${esc(c.val)}<span class="x" title="Remove">×</span></span>`).join("");
  host.querySelectorAll('.active-chip .x').forEach((x,i)=>{
    x.addEventListener('click',()=>{
      const c = chips[i];
      if(c.type==='q'){ state.q=""; si.value=""; sc.style.display='none'; }
      else {
        state.sel[c.key].delete(c.val);
        const cb = document.getElementById(c.key+"__"+c.val.replace(/[^a-z0-9]/gi,'_'));
        if(cb) cb.checked=false;
      }
      apply(false);
    });
  });
}

// keyboard shortcuts: "/" focus search, Esc blur
window.addEventListener('keydown',e=>{
  if(e.key==='/' && document.activeElement!==si){ e.preventDefault(); si.focus(); si.select(); }
  else if(e.key==='Escape' && document.activeElement===si){ si.blur(); }
});

// ---- live data (Airtable via export API) ----
const API_PARAMS = new URLSearchParams(location.search);
const API_PORT = API_PARAMS.get('apiPort') || '8765';
const API_BASE = API_PARAMS.get('api') || `${location.protocol}//${location.hostname}:${API_PORT}`;

function rebuild(){
  state.q=""; if(si){ si.value=""; if(sc) sc.style.display='none'; }
  FILTER_DEFS.forEach(d=>state.sel[d.key].clear());
  buildMarkers();
  buildLegend();
  renderFilters();
  apply(false);
}

async function loadLive(force){
  const pill = document.getElementById('srcPill');
  if(pill){ pill.textContent='loading…'; pill.className='src-pill loading'; }
  try{
    const res = await fetch(API_BASE+'/locations'+(force?'?refresh=1':''),{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const locs = json.locations || [];
    if(!locs.length) throw new Error('no records');
    RAW = locs;
    rebuild();
    const m = json.meta||{};
    if(pill){
      pill.textContent = (m.cached?'cached':'live')+' · '+fmt(RAW.length);
      pill.className='src-pill live';
      pill.title = `Airtable · ${fmt(m.matched||0)} precise · ${fmt(m.approx||0)} approx · ${fmt(m.unplaced||0)} unplaced`;
    }
  }catch(err){
    if(pill){ pill.textContent='snapshot'; pill.className='src-pill off';
      pill.title='Live fetch failed — showing bundled snapshot ('+err.message+')'; }
  }
}

// ---- init ----
renderFilters();
buildLegend();
apply(false);
setTimeout(()=>map.invalidateSize(),200);
const refreshBtn = document.getElementById('refreshBtn');
if(refreshBtn) refreshBtn.addEventListener('click',()=>loadLive(true));
loadLive(false);
</script>
