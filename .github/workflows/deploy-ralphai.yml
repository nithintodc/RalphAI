# Path A: Git push → GitHub Actions → Cloud Build → Cloud Run (todc-reporting-app)
# Prerequisites: run scripts/gcp-bootstrap.sh once, add GitHub secrets (see docs/DEPLOY_PATH_A.md)

name: Deploy RalphAI (Cloud Run)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-ralphai-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: todc-reporting-app
  AR_REPOSITORY: ralphai

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build image (Cloud Build)
        id: build
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE_NAME}:${TAG}"
          echo "Building ${IMAGE}"
          gcloud builds submit . \
            --config=infra/gcp/cloudbuild.yaml \
            --substitutions=_IMAGE="${IMAGE}" \
            --project="${PROJECT_ID}" \
            --quiet
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          SECRET_FLAGS=""
          add_secret() {
            local env_name="$1"
            local secret_name="$2"
            if gcloud secrets describe "${secret_name}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
              if [[ -n "${SECRET_FLAGS}" ]]; then SECRET_FLAGS+=","; fi
              SECRET_FLAGS+="${env_name}=${secret_name}:latest"
            else
              echo "Skipping secret ${secret_name} (not created yet — run gcp-bootstrap.sh)"
            fi
          }
          add_secret "ANTHROPIC_API_KEY" "ANTHROPIC_API_KEY"
          add_secret "AIRTABLE_PAT" "AIRTABLE_PAT"
          add_secret "GCP_SERVICE_ACCOUNT_JSON" "todc-export-sa-json"
          add_secret "SLACK_BOT_TOKEN" "SLACK_BOT_TOKEN"
          add_secret "SLACK_SIGNING_SECRET" "SLACK_SIGNING_SECRET"

          ENV_FILE="$(mktemp)"
          {
            echo "LOG_LEVEL: INFO"
            echo "GOOGLE_SHARED_DRIVE_NAME: ${{ vars.GOOGLE_SHARED_DRIVE_NAME || 'Data-Analysis-Uploads' }}"
            [[ -n "${{ vars.AIRTABLE_BASE_ID }}" ]] && echo "AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}"
            [[ -n "${{ vars.AIRTABLE_TABLE_ID }}" ]] && echo "AIRTABLE_TABLE_ID: ${{ vars.AIRTABLE_TABLE_ID }}"
          } >"$ENV_FILE"

          DEPLOY_ARGS=(
            run deploy "${SERVICE_NAME}"
            --image="${IMAGE}"
            --region="${REGION}"
            --platform=managed
            --allow-unauthenticated
            --memory=2Gi
            --cpu=2
            --timeout=3600
            --max-instances=5
            --min-instances=0
            --project="${PROJECT_ID}"
            --env-vars-file="${ENV_FILE}"
            --quiet
          )
          if [[ -n "${SECRET_FLAGS}" ]]; then
            DEPLOY_ARGS+=(--update-secrets="${SECRET_FLAGS}")
          fi
          gcloud "${DEPLOY_ARGS[@]}"
          rm -f "$ENV_FILE"

      - name: Print service URL
        run: |
          URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --region="${{ secrets.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')"
          echo "## RalphAI deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "Open \`${URL}\` for the workspace dashboard." >> "$GITHUB_STEP_SUMMARY"
